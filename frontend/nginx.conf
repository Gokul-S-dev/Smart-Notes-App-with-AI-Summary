server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # React Router support
    location / {
        try_files $uri $uri/ /index.html;

    }

    # Gzip Compression
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1000;

    gzip_types 
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml;
}